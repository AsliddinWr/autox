<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Dashboard - Telegram Auto Poster</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <main class="dashboard">
    <header class="topbar">
      <div>
        <h1>✈️ Telegram Auto Poster</h1>
        <p class="muted">Guruh va kanallarga avtomatik xabar yuborish</p>
      </div>
      <a href="/logout" class="logout">Chiqish</a>
    </header>

    <div id="alert" class="alert hidden"></div>

    <section class="grid">
      <div class="card">
        <div class="section-head">
          <h2>Guruhlar va kanallar</h2>
          <button id="refreshGroups" class="small">Yangilash</button>
        </div>

        <div id="groupsList" class="list muted">Yuklanmoqda...</div>
      </div>

      <div class="card">
        <h2>Yangi jadval</h2>

        <form id="scheduleForm" class="form">
          <label>Guruhni tanlang</label>
          <select id="groupSelect" required>
            <option value="">Guruh tanlang...</option>
          </select>

          <label>Xabar matni</label>
          <textarea id="message" maxlength="4096" rows="6" placeholder="Yuboriladigan xabar..." required></textarea>
          <div class="counter"><span id="charCount">0</span>/4096</div>

          <label>Vaqt oralig‘i</label>
          <div class="row">
            <input id="interval" type="number" min="1" value="5" required>
            <select id="intervalType">
              <option value="minutes">Daqiqa</option>
              <option value="hours">Soat</option>
            </select>
          </div>

          <button type="submit">Jadvalga qo‘shish</button>
        </form>
      </div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>Faol jadvallar</h2>
        <button id="refreshTasks" class="small">Yangilash</button>
      </div>

      <div id="tasksList" class="list muted">Yuklanmoqda...</div>
    </section>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
