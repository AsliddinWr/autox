<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Telegram Auto Poster - Kirish</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <main class="auth-page">
    <section class="card auth-card">
      <div class="logo">✈️</div>
      <h1>Telegram Auto Poster</h1>
      <p class="muted">Telegram akkauntingiz orqali kiring</p>

      <div id="alert" class="alert hidden"></div>

      <form id="phoneForm" class="form">
        <label>Davlat kodi</label>
        <select id="countryCode">
          <option value="+998">🇺🇿 O‘zbekiston +998</option>
          <option value="+7">🇷🇺 Rossiya +7</option>
          <option value="+7">🇰🇿 Qozog‘iston +7</option>
          <option value="+1">🇺🇸 AQSH +1</option>
          <option value="+44">🇬🇧 Buyuk Britaniya +44</option>
          <option value="+49">🇩🇪 Germaniya +49</option>
          <option value="+90">🇹🇷 Turkiya +90</option>
        </select>

        <label>Telefon raqam</label>
        <input id="phoneNumber" type="tel" placeholder="901234567" required>

        <button type="submit">Kod yuborish</button>
      </form>

      <form id="codeForm" class="form hidden">
        <label>Telegram kodi</label>
        <input id="code" type="text" placeholder="12345" required>
        <button type="submit">Tasdiqlash</button>
        <button type="button" class="secondary" onclick="showPhoneForm()">Raqamni o‘zgartirish</button>
      </form>

      <form id="passwordForm" class="form hidden">
        <label>2 bosqichli parol</label>
        <input id="password" type="password" placeholder="Telegram cloud password" required>
        <button type="submit">Parolni tasdiqlash</button>
      </form>

      <p class="safe">🔒 Ma’lumotlaringiz serverda xavfsiz saqlanadi. Faqat o‘zingiz ruxsat bergan joylarda foydalaning.</p>
    </section>
  </main>

  <script>
    const phoneForm = document.getElementById("phoneForm");
    const codeForm = document.getElementById("codeForm");
    const passwordForm = document.getElementById("passwordForm");
    const alertBox = document.getElementById("alert");

    function showAlert(message, type = "error") {
      alertBox.textContent = message;
      alertBox.className = "alert " + type;
    }

    function hideAlert() {
      alertBox.className = "alert hidden";
      alertBox.textContent = "";
    }

    function showPhoneForm() {
      phoneForm.classList.remove("hidden");
      codeForm.classList.add("hidden");
      passwordForm.classList.add("hidden");
      hideAlert();
    }

    phoneForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideAlert();

      const countryCode = document.getElementById("countryCode").value;
      const phoneNumber = document.getElementById("phoneNumber").value.replace(/\D/g, "");
      const phone = countryCode + phoneNumber;

      const button = phoneForm.querySelector("button");
      button.disabled = true;
      button.textContent = "Yuborilmoqda...";

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({phone})
        });

        const data = await res.json();

        if (!data.success) throw new Error(data.error || "Xatolik yuz berdi");

        phoneForm.classList.add("hidden");
        codeForm.classList.remove("hidden");
        showAlert("Kod Telegram ilovangizga yuborildi", "success");
      } catch (err) {
        showAlert(err.message);
      } finally {
        button.disabled = false;
        button.textContent = "Kod yuborish";
      }
    });

    codeForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideAlert();

      const code = document.getElementById("code").value.trim();
      const button = codeForm.querySelector("button");

      button.disabled = true;
      button.textContent = "Tekshirilmoqda...";

      try {
        const res = await fetch("/verify", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({code})
        });

        const data = await res.json();

        if (data.password_required) {
          codeForm.classList.add("hidden");
          passwordForm.classList.remove("hidden");
          showAlert("2 bosqichli parolni kiriting", "success");
          return;
        }

        if (!data.success) throw new Error(data.error || "Kod noto‘g‘ri");

        window.location.href = "/";
      } catch (err) {
        showAlert(err.message);
      } finally {
        button.disabled = false;
        button.textContent = "Tasdiqlash";
      }
    });

    passwordForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideAlert();

      const password = document.getElementById("password").value;
      const button = passwordForm.querySelector("button");

      button.disabled = true;
      button.textContent = "Tekshirilmoqda...";

      try {
        const res = await fetch("/verify-password", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({password})
        });

        const data = await res.json();

        if (!data.success) throw new Error(data.error || "Parol noto‘g‘ri");

        window.location.href = "/";
      } catch (err) {
        showAlert(err.message);
      } finally {
        button.disabled = false;
        button.textContent = "Parolni tasdiqlash";
      }
    });
  </script>
</body>
</html>
